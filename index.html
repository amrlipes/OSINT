<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Neural Nexus</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        <!-- Header -->
        <header id="top-bar">
            <div class="logo">
                <span class="glitch" data-text="NEXUS_OS">NEXUS_OS</span><span class="version">v1.0.0</span>
            </div>
            <div class="status-indicator">
                <div class="dot blinking"></div>
                <span>SISTEMA ONLINE</span>
            </div>
        </header>

        <!-- Search Modules Panel -->
        <section id="search-modules-container">
            <div class="search-module" data-type="username">
                <div class="module-header">
                    <span class="module-icon">@</span>
                    <span class="module-title">Rastreio de Usuário</span>
                </div>
                <div class="module-body">
                    <input type="text" id="username-input" placeholder="ex: @johndoe" autocomplete="off" spellcheck="false">
                    <button class="execute-btn" id="btn-username">RUN_</button>
                </div>
            </div>

            <div class="search-module" data-type="name">
                <div class="module-header">
                    <span class="module-icon">></span>
                    <span class="module-title">Identidade Real</span>
                </div>
                <div class="module-body">
                    <input type="text" id="name-input" placeholder="ex: John Doe" autocomplete="off" spellcheck="false">
                    <button class="execute-btn" id="btn-name">RUN_</button>
                </div>
            </div>

            <div class="search-module" data-type="email">
                <div class="module-header">
                    <span class="module-icon">✉</span>
                    <span class="module-title">Varredura de E-mail</span>
                </div>
                <div class="module-body">
                    <input type="email" id="email-input" placeholder="ex: john@email.com" autocomplete="off" spellcheck="false">
                    <button class="execute-btn" id="btn-email">RUN_</button>
                </div>
            </div>

            <div class="search-module" data-type="phone">
                <div class="module-header">
                    <span class="module-icon">#</span>
                    <span class="module-title">Interceptação Numérica</span>
                </div>
                <div class="module-body">
                    <input type="text" id="phone-input" placeholder="ex: +55 11..." autocomplete="off" spellcheck="false">
                    <button class="execute-btn" id="btn-phone">RUN_</button>
                </div>
            </div>
        </section>

        <!-- Main Content -->
        <main id="main-panel">
            <!-- Node Canvas Area -->
            <section id="node-canvas">
                <!-- Nodes will be injected here via JS -->
                <div class="canvas-overlay">AGUARDANDO OBTENÇÃO DO ALVO...</div>
            </section>

            <!-- Terminal Logs -->
            <aside id="terminal-sidebar">
                <div class="terminal-header">
                    <span>// REGISTROS DO SISTEMA</span>
                    <div class="terminal-controls">
                        <span class="control-btn minimize"></span>
                        <span class="control-btn maximize"></span>
                        <span class="control-btn close"></span>
                    </div>
                </div>
                <div id="terminal-content">
                    <p class="log system">[SYS] Sequência de inicialização concluída.</p>
                    <p class="log system">[SYS] Canal seguro estabelecido.</p>
                    <p class="log system">[SYS] Aguardando entrada.</p>
                </div>
            </aside>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
</body>
</html>
